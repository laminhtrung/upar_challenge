experiment_name: effb0_part_attr
seed: 42
num_classes: 40
device: cuda
gpu_id: 0
output_dir: outputs

data:
  train_csv: /root/trunglm8/upar_challenge/raw_data/train.csv
  val_csv: /root/trunglm8/upar_challenge/raw_data/val.csv
  test_csv: /root/trunglm8/upar_challenge/raw_data/test.csv
  img_dirs:
    - /root/trunglm8/upar_challenge/raw_data/data/Market1501/bounding_box_train
    - /root/trunglm8/upar_challenge/raw_data/data/PA100k/release_data/release_data
    - /root/trunglm8/upar_challenge/raw_data/data/PETA/images
  image_size: [384, 128]

model:
  name: effb0_part
  pretrained: true
  dropout: 0.2
  num_parts: 4
  embed_dim: 256

train:
  batch_size: 32
  epochs: 30
  num_workers: 4

optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.0001

scheduler:
  name: cosine
  t_max: 30
  eta_min: 0.000001

loss:
  name: bce
  use_auto_class_weight: false
  use_pos_weight: true
  pos_weight_max: 10.0
  label_smoothing: 0.1 

augment:
  horizontal_flip: 0.5
  rotation: 10

threshold:
  value: 0.5