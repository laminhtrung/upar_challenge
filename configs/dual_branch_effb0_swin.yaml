experiment_name: dual_branch_effb0_swin
seed: 42
num_classes: 40
device: cuda
gpu_id: 0
output_dir: outputs

data:
  train_csv: /root/trunglm8/upar_challenge/raw_data/train.csv
  val_csv: /root/trunglm8/upar_challenge/raw_data/val.csv
  test_csv: /root/trunglm8/upar_challenge/raw_data/test.csv
  img_dirs:
    - /root/trunglm8/upar_challenge/raw_data/data/Market1501/bounding_box_train
    - /root/trunglm8/upar_challenge/raw_data/data/PA100k/release_data/release_data
    - /root/trunglm8/upar_challenge/raw_data/data/PETA/images
  image_size: [384, 128]
  batch_size: 16
  num_workers: 4
  skiprows: 1

model:
  name: dual_branch_effb0_swin
  pretrained: true
  dropout: 0.4
  cnn_name: efficientnet_b0
  transformer_name: swin_tiny_patch4_window7_224
  fusion_dim: 256

loss:
  name: bce
  use_auto_class_weight: false
  use_pos_weight: true
  pos_weight_max: 10.0
  label_smoothing: 0.1 

train:
  epochs: 40
  lr: 0.0002
  weight_decay: 0.0001
  scheduler: cosine
  eta_min: 1e-6